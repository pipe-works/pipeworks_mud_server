name: CI

on:
  push:
    branches: [main, develop, release-please--*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # Allow manual triggering
  workflow_call:  # Allow being called by other workflows

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    uses: pipe-works/.github/.github/workflows/reusable-python-ci.yml@codex/ci-phase2-content-validation
    with:
      python-version: '3.12'
      python-versions: '["3.12", "3.13"]'
      coverage-threshold: 80
      run-security: true
      run-docs: true
      run-gitleaks: true
      requires-models: true
      coverage-on-matrix: false
      pytest-matrix-markers: not slow and not requires_model
      run-content-validation: true
      skip-full-ci-on-content-only-pr: true
      content-paths: |
        data/worlds/**
        docs/**
        *.md
      content-validation-command: pytest --override-ini addopts= -q tests/test_core/test_policy_manifest.py
    secrets: inherit
