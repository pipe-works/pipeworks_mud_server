  - id: clothing_environment_wet_weather_v1
    version: 1
    block_type: clothing_fragment
    status: active
    render_priority: 91
    fragment_path: policies/image/blocks/clothing/environment/wet_weather_v1.txt
    compatible_genders: [male, female]
    selection_rules:
      when:
        world_context_any: [wet, rainy, monsoon, marsh]

  - id: clothing_environment_rural_v1
    version: 1
    block_type: clothing_fragment
    status: active
