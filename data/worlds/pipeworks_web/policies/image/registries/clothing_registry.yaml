schema_version: 0.1.0
policy_schema: pipeworks_policy_v1

registry:
  id: clothing_registry
  version: 1
  kind: clothing

references:
- policy_id: species_block:image.blocks.species:goblin
  variant: v1
- policy_id: species_block:image.blocks.species:human
  variant: v1

composition_contract:
  slots: [environment, activity, wealth]
  max_entries_per_slot: 1

defaults:
  profile_id: clothing_default_v1

slots:
  environment:
  - id: clothing_environment_maritime_v2
    version: 1
    block_type: clothing_fragment
    status: active
    render_priority: 96
    fragment_path: policies/image/blocks/clothing/environment/maritime_v2.txt
    compatible_genders: [male, female]
    selection_rules:
      when:
        world_context_any: [maritime, open_water, sea]

  - id: clothing_environment_coastal_v1
    version: 1
    block_type: clothing_fragment
    status: active
    render_priority: 95
    fragment_path: policies/image/blocks/clothing/environment/coastal_v1.txt
    compatible_genders: [male, female]
    selection_rules:
      when:
        world_context_any: [coastal, harbor]

  - id: clothing_environment_urban_v1
    version: 1
    block_type: clothing_fragment
    status: active
    render_priority: 94
    fragment_path: policies/image/blocks/clothing/environment/urban_v1.txt
    compatible_genders: [male, female]
    selection_rules:
      when:
        world_context_any: [urban, city, market_district]

  - id: clothing_environment_industrial_v1
    version: 1
    block_type: clothing_fragment
    status: active
    render_priority: 93
    fragment_path: policies/image/blocks/clothing/environment/industrial_v1.txt
    compatible_genders: [male, female]
    selection_rules:
      when:
        world_context_any: [industrial, foundry, workshop_district]

  - id: clothing_environment_cold_weather_v1
    version: 1
