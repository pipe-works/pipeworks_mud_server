    status: active
    render_priority: 95
    fragment_path: policies/image/blocks/clothing/activity/dockwork_v1.txt
    compatible_genders: [male, female]
    selection_rules:
      when:
        occupation_signal_any: [dock_work, cargo_handling, longshore, port_labour]

  - id: clothing_activity_street_trade_v1
    version: 1
